<!DOCTYPE html>
<html lang="pt-AO">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>+244 Consultoria & Marketing — Estratégia. Branding. Angola.</title>
  <meta name="description" content="+244 Consultoria & Marketing — Especialistas em consultoria estratégica, branding e marketing para o mercado angolano e internacional." />
  <meta property="og:title" content="+244 Consultoria & Marketing" />
  <meta property="og:description" content="Consultoria estratégica, branding e marketing para empresas que querem liderar em Angola." />
  <meta property="og:type" content="website" />
  <meta property="og:locale" content="pt_AO" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,600;1,9..144,300;1,9..144,400&family=Geist:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>

  <style>
    #splash * { margin: 0; padding: 0; box-sizing: border-box; }

    body.splash-active { overflow: hidden; }

    #site-wrapper {
      opacity: 0;
      visibility: hidden;
    }
    #site-wrapper.ready {
      opacity: 1;
      visibility: visible;
      transition: opacity 0.5s ease;
    }

    #splash {
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at 50% 40%, #0a1f5c 0%, #04103a 40%, #020810 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 99999;
      overflow: hidden;
      font-family: 'Arial', sans-serif;
    }

    #bgCanvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    .sp-particle {
      position: absolute;
      border-radius: 50%;
      background: #4af;
      pointer-events: none;
    }

    .sp-center-glow {
      position: absolute;
      width: 300px;
      height: 300px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(0,120,255,0.15) 0%, transparent 70%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }

    #sp-logo-wrap {
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    #sp-logo-row {
      display: flex;
      align-items: center;
      gap: 14px;
      position: relative;
    }

    #sp-circles-icon {
      width: 80px;
      height: 96px;
      flex-shrink: 0;
      opacity: 0;
    }

    #sp-logo-text {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      position: relative;
      overflow: hidden;
    }

    #sp-by-evision {
      font-size: 11px;
      color: #7bbfff;
      letter-spacing: 1px;
      opacity: 0;
      align-self: flex-end;
      margin-bottom: 2px;
      font-style: italic;
    }

    #sp-main-title {
      font-size: clamp(64px, 14vw, 90px);
      font-weight: 900;
      letter-spacing: -2px;
      line-height: 1;
      color: transparent;
      background: linear-gradient(180deg, #ffffff 0%, #60b4ff 30%, #1a7eff 65%, #0050cc 100%);
      -webkit-background-clip: text;
      background-clip: text;
      position: relative;
      opacity: 0;
      filter: drop-shadow(0 0 20px rgba(30,120,255,0.8)) drop-shadow(0 0 40px rgba(30,100,255,0.4));
    }

    #sp-flare {
      position: absolute;
      top: 0;
      left: -100%;
      width: 60px;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.6), rgba(180,220,255,0.3), transparent);
      pointer-events: none;
      z-index: 5;
      transform: skewX(-15deg);
    }

    #sp-subtitle {
      font-size: clamp(11px, 2.5vw, 14px);
      color: #a0cfff;
      letter-spacing: 3px;
      font-weight: 400;
      margin-top: 6px;
      opacity: 0;
      text-align: center;
      text-shadow: 0 0 10px rgba(100,180,255,0.5);
    }

    #sp-h-line {
      position: absolute;
      height: 1px;
      width: 0;
      background: linear-gradient(90deg, transparent, #4af, #fff, #4af, transparent);
      top: 50%;
      left: 0;
      box-shadow: 0 0 8px #4af, 0 0 20px rgba(0,150,255,0.5);
      pointer-events: none;
      z-index: 8;
    }
  </style>

  <link rel="stylesheet" href="css/main.css" />
</head>
<body>

  <!-- SPLASH -->
  <div id="splash" role="presentation" aria-hidden="true">
    <canvas id="bgCanvas"></canvas>
    <div class="sp-center-glow"></div>
    <div id="sp-h-line"></div>

    <div id="sp-logo-wrap">
      <div id="sp-logo-row">
        <svg id="sp-circles-icon" viewBox="0 0 80 96" fill="none" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <radialGradient id="cg" cx="50%" cy="50%" r="50%">
              <stop offset="0%" stop-color="#60c0ff"/>
              <stop offset="100%" stop-color="#1060cc"/>
            </radialGradient>
            <filter id="glow">
              <feGaussianBlur stdDeviation="1.5" result="blur"/>
              <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
            </filter>
          </defs>
          <g filter="url(#glow)">
            <circle cx="38" cy="48" r="5"   fill="#80d0ff" opacity="0.9"/>
            <circle cx="38" cy="30" r="4"   fill="url(#cg)" opacity="0.85"/>
            <circle cx="52" cy="38" r="4"   fill="url(#cg)" opacity="0.85"/>
            <circle cx="52" cy="58" r="4"   fill="url(#cg)" opacity="0.85"/>
            <circle cx="38" cy="66" r="4"   fill="url(#cg)" opacity="0.85"/>
            <circle cx="24" cy="58" r="4"   fill="url(#cg)" opacity="0.85"/>
            <circle cx="24" cy="38" r="4"   fill="url(#cg)" opacity="0.85"/>
            <circle cx="38" cy="16" r="3"   fill="#4aafff" opacity="0.7"/>
            <circle cx="57" cy="22" r="3"   fill="#4aafff" opacity="0.7"/>
            <circle cx="65" cy="40" r="3"   fill="#4aafff" opacity="0.7"/>
            <circle cx="62" cy="62" r="2.5" fill="#4aafff" opacity="0.65"/>
            <circle cx="47" cy="76" r="2.5" fill="#4aafff" opacity="0.65"/>
            <circle cx="28" cy="78" r="2.5" fill="#4aafff" opacity="0.6"/>
            <circle cx="14" cy="65" r="2.5" fill="#4aafff" opacity="0.6"/>
            <circle cx="11" cy="45" r="2.5" fill="#4aafff" opacity="0.65"/>
            <circle cx="18" cy="25" r="3"   fill="#4aafff" opacity="0.7"/>
            <circle cx="38" cy="8"  r="2"   fill="#80cfff" opacity="0.5"/>
            <circle cx="58" cy="12" r="1.5" fill="#80cfff" opacity="0.45"/>
            <circle cx="70" cy="30" r="1.5" fill="#80cfff" opacity="0.45"/>
            <circle cx="72" cy="52" r="1.5" fill="#80cfff" opacity="0.4"/>
            <circle cx="54" cy="84" r="1.5" fill="#80cfff" opacity="0.4"/>
            <circle cx="22" cy="86" r="1.5" fill="#80cfff" opacity="0.4"/>
            <circle cx="8"  cy="70" r="1.5" fill="#80cfff" opacity="0.4"/>
            <circle cx="6"  cy="38" r="1.5" fill="#80cfff" opacity="0.45"/>
            <circle cx="18" cy="12" r="2"   fill="#80cfff" opacity="0.5"/>
            <circle cx="38" cy="24" r="2"   fill="#c0e8ff" opacity="0.6"/>
            <circle cx="49" cy="30" r="2"   fill="#c0e8ff" opacity="0.6"/>
            <circle cx="27" cy="30" r="2"   fill="#c0e8ff" opacity="0.6"/>
          </g>
          <circle cx="38" cy="48" r="3" fill="white" opacity="0.9"/>
          <circle cx="38" cy="48" r="8" fill="#60b0ff" opacity="0.2"/>
        </svg>

        <div id="sp-logo-text">
          <span id="sp-by-evision">by: E-Vision</span>
          <span id="sp-main-title">
            +244
            <div id="sp-flare"></div>
          </span>
        </div>
      </div>

      <div id="sp-subtitle">CONSULTORIA &nbsp;|&nbsp; MARKETING &nbsp;|&nbsp; EVENTOS</div>
    </div>
  </div>


  <!-- SITE PRINCIPAL -->
  <div id="site-wrapper">
    <div id="site-header"></div>
    <main id="site-main"></main>
    <div id="site-footer"></div>
    <button class="back-top" id="backTop" aria-label="Voltar ao topo">
      <span class="arrow-up" aria-hidden="true"></span>
    </button>
  </div>


  <script>
    'use strict';

    /* ────────────────────────────────────────────
       1. SPLASH — canvas + animações
    ──────────────────────────────────────────── */
    (function () {
      document.body.classList.add('splash-active');

      var canvas = document.getElementById('bgCanvas');
      var ctx    = canvas.getContext('2d');
      var W, H, animFrame, t = 0;

      function resize() {
        W = canvas.width  = window.innerWidth;
        H = canvas.height = window.innerHeight;
        updatePos();
      }

      var groups = [
        { cx:0, cy:0, angle:0,              speed: 0.004,  color:'rgba(80,160,255,', count:22, spread:2.2 },
        { cx:0, cy:0, angle:Math.PI*0.3,    speed:-0.003,  color:'rgba(60,130,220,', count:18, spread:1.8 },
        { cx:0, cy:0, angle:Math.PI*0.7,    speed: 0.0025, color:'rgba(40,100,200,', count:14, spread:1.6 }
      ];

      function updatePos() {
        groups[0].cx = W*0.72; groups[0].cy = -H*0.1;
        groups[1].cx = W*0.15; groups[1].cy =  H*0.5;
        groups[2].cx = W*0.85; groups[2].cy =  H*0.85;
      }

      resize();
      window.addEventListener('resize', resize);

      var linesOpacity = 0;

      function draw() {
        t++;
        ctx.clearRect(0, 0, W, H);
        groups.forEach(function(g) {
          g.angle += g.speed;
          for (var i = 0; i < g.count; i++) {
            var a   = g.angle + (i / g.count) * Math.PI * g.spread;
            var len = Math.max(W, H) * 1.6;
            var alpha = linesOpacity * (0.08 + 0.04 * Math.sin(t * 0.001 + i));
            ctx.beginPath();
            ctx.moveTo(g.cx, g.cy);
            ctx.lineTo(g.cx + Math.cos(a)*len, g.cy + Math.sin(a)*len);
            ctx.strokeStyle = g.color + alpha + ')';
            ctx.lineWidth   = 0.6;
            ctx.stroke();
          }
        });
        animFrame = requestAnimationFrame(draw);
      }
      draw();

      /* Partículas */
      var splashEl = document.getElementById('splash');
      for (var i = 0; i < 55; i++) {
        (function(idx) {
          var el   = document.createElement('div');
          el.className = 'sp-particle';
          var size = Math.random() * 2.5 + 0.8;
          el.style.cssText = 'width:'+size+'px;height:'+size+'px;left:'+(Math.random()*100)+'%;top:'+(Math.random()*100)+'%;opacity:0;';
          splashEl.appendChild(el);
          gsap.to(el, {
            opacity: Math.random() * 0.7 + 0.2,
            duration: 0.6,
            delay: 0.3 + idx * 0.03,
            yoyo: true,
            repeat: -1,
            repeatDelay: Math.random() * 2
          });
        })(i);
      }

      /* Estados iniciais GSAP */
      gsap.set('#sp-circles-icon', { x: -20 });
      gsap.set('#sp-subtitle',     { y: 10  });

      /* Timeline */
      var tl = gsap.timeline({ delay: 0.1 });

      tl.to({}, {
        duration: 0.8,
        onUpdate: function() { linesOpacity = this.progress(); }
      });

      tl.fromTo('#sp-h-line',
        { width:0, left:0, opacity:1 },
        { width:'100%', duration:0.5, ease:'power2.in' },
        '-=0.2'
      );
      tl.to('#sp-h-line', { opacity:0, duration:0.2 });

      tl.to('#sp-circles-icon', { opacity:1, x:0, duration:0.5, ease:'back.out(1.4)' }, '-=0.1');
      tl.to('#sp-by-evision',   { opacity:1, y:0, duration:0.3, ease:'power2.out'    }, '-=0.2');
      tl.to('#sp-main-title',   { opacity:1,      duration:0.4, ease:'power2.out'    }, '-=0.15');

      tl.fromTo('#sp-flare',
        { left:'-20%' },
        { left:'110%', duration:0.6, ease:'power2.inOut' },
        '-=0.1'
      );

      tl.to('#sp-subtitle', { opacity:1, y:0, duration:0.5, ease:'power2.out' }, '-=0.2');

      /* Mínimo 2.2s visível; depois espera confirmação de site carregado */
      tl.to({}, { duration: 2.2 });

      tl.to('#splash', {
        opacity: 0,
        duration: 0.7,
        ease: 'power2.inOut',
        onComplete: function() {
          splashEl.style.display = 'none';
          document.body.classList.remove('splash-active');
          cancelAnimationFrame(animFrame);
          document.getElementById('site-wrapper').classList.add('ready');
        }
      });

      window._splashTL = tl;
    })();


    /* ────────────────────────────────────────────
       2. LOADER DE SECÇÕES
    ──────────────────────────────────────────── */
    var headerSections = ['header'];
    var mainSections   = [
      'hero','sobre','servicos','angola','parceiros',
      'eventos','portfolio','testemunhos','agendamento','contactos'
    ];
    var footerSections = ['footer'];

    function loadSection(name) {
      return fetch('sections/' + name + '.html').then(function(r) {
        if (!r.ok) throw new Error('Erro ao carregar: ' + name);
        return r.text();
      });
    }

    function loadAll() {
      var headerEl = document.getElementById('site-header');
      var mainEl   = document.getElementById('site-main');
      var footerEl = document.getElementById('site-footer');

      var pHeader = Promise.all(headerSections.map(loadSection)).then(function(parts) {
        headerEl.innerHTML = parts.join('');
      });
      var pMain = Promise.all(mainSections.map(loadSection)).then(function(parts) {
        mainEl.innerHTML = parts.join('');
      });
      var pFooter = Promise.all(footerSections.map(loadSection)).then(function(parts) {
        footerEl.innerHTML = parts.join('');
      });

      return Promise.all([pHeader, pMain, pFooter]);
    }

    function initScripts() {
      var script = document.createElement('script');
      script.src = 'js/main.js';
      document.body.appendChild(script);
    }

    loadAll()
      .then(function() {
        initScripts();
        /* Se o splash já terminou a sua duração mínima, deixa-o fechar normalmente.
           Se o site carregou antes do splash terminar, não faz nada — o splash
           fecha sozinho no seu tempo. */
      })
      .catch(function(err) {
        console.error('Erro ao carregar o site:', err);
        /* Em caso de erro, avança o splash para não bloquear o utilizador */
        if (window._splashTL) window._splashTL.progress(1);
      });
  </script>

</body>
</html>
