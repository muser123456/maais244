<!DOCTYPE html>
<html lang="pt-AO">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>+244 Consultoria & Marketing — Estratégia. Branding. Angola.</title>
  <meta name="description" content="+244 Consultoria & Marketing — Especialistas em consultoria estratégica, branding e marketing para o mercado angolano e internacional." />
  <meta property="og:title" content="+244 Consultoria & Marketing" />
  <meta property="og:description" content="Consultoria estratégica, branding e marketing para empresas que querem liderar em Angola." />
  <meta property="og:type" content="website" />
  <meta property="og:locale" content="pt_AO" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,600;1,9..144,300;1,9..144,400&family=Geist:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>

  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    body.splash-active { overflow:hidden; }

    #site-wrapper { opacity:0; visibility:hidden; }
    #site-wrapper.ready { opacity:1; visibility:visible; transition:opacity 0.6s ease; }

    /* ─── SPLASH ─── */
    #splash {
      position:fixed; inset:0;
      background:#020810;
      display:flex; align-items:center; justify-content:center;
      z-index:99999; overflow:hidden;
      font-family:'Geist','Arial',sans-serif;
    }
    #sp-canvas { position:absolute; inset:0; width:100%; height:100%; }

    /* Vinheta radial */
    #splash::before {
      content:''; position:absolute; inset:0;
      background:radial-gradient(ellipse 85% 85% at 50% 50%,
        transparent 25%, rgba(2,8,16,0.45) 65%, rgba(2,8,16,0.92) 100%);
      pointer-events:none; z-index:5;
    }

    /* Anéis de pulso */
    .sp-ring {
      position:absolute; border-radius:50%;
      top:50%; left:50%; transform:translate(-50%,-50%) scale(0);
      pointer-events:none;
      border:1px solid rgba(70,150,255,0.25);
    }
    .sp-ring-1 { width:160px; height:160px; }
    .sp-ring-2 { width:300px; height:300px; }
    .sp-ring-3 { width:480px; height:480px; }
    .sp-ring-4 { width:700px; height:700px; border-color:rgba(70,150,255,0.12); }

    /* Scanline */
    #sp-scan {
      position:absolute; height:1px; width:0; left:0; top:50%;
      background:linear-gradient(90deg,transparent 0%,rgba(0,160,255,0.4) 20%,#80e0ff 50%,rgba(0,160,255,0.4) 80%,transparent 100%);
      box-shadow:0 0 14px rgba(0,200,255,0.9),0 0 35px rgba(0,120,255,0.4);
      z-index:8;
    }

    /* Logo central */
    #sp-center {
      position:relative; z-index:10;
      display:flex; flex-direction:column; align-items:center;
    }

    #sp-tag {
      font-size:10px; letter-spacing:4px; color:rgba(120,180,255,0.65);
      font-style:italic; opacity:0; margin-bottom:10px;
    }

    #sp-row { display:flex; align-items:center; gap:20px; }

    #sp-icon {
      width:62px; height:75px; flex-shrink:0;
      opacity:0;
      filter:drop-shadow(0 0 14px rgba(80,180,255,0.95));
    }

    #sp-num-wrap { position:relative; overflow:hidden; }

    #sp-number {
      display:block;
      font-size:clamp(72px,15vw,102px);
      font-weight:900; letter-spacing:-3px; line-height:1;
      color:transparent;
      background:linear-gradient(165deg,#fff 0%,#a8d8ff 18%,#4aadff 42%,#1a7eff 68%,#003ecc 100%);
      -webkit-background-clip:text; background-clip:text;
      opacity:0;
      filter:drop-shadow(0 0 26px rgba(30,130,255,0.95)) drop-shadow(0 0 55px rgba(30,110,255,0.45));
    }

    /* Glitch ghost */
    #sp-ghost {
      position:absolute; inset:0; pointer-events:none;
      font-size:clamp(72px,15vw,102px);
      font-weight:900; letter-spacing:-3px; line-height:1;
      color:transparent;
      background:linear-gradient(165deg,rgba(255,40,80,0.2),rgba(0,220,255,0.2));
      -webkit-background-clip:text; background-clip:text;
      opacity:0;
    }

    /* Flare sweep */
    #sp-flare {
      position:absolute; inset:0;
      background:linear-gradient(105deg,transparent 30%,rgba(255,255,255,0.55) 50%,rgba(200,240,255,0.18) 55%,transparent 70%);
      transform:translateX(-120%); pointer-events:none; z-index:2;
    }

    #sp-sub {
      font-size:clamp(10px,1.8vw,12px); letter-spacing:6px;
      color:rgba(160,215,255,0.8);
      text-transform:uppercase; opacity:0; margin-top:18px;
      text-shadow:0 0 18px rgba(80,190,255,0.5);
    }

    /* Progress */
    #sp-prog-wrap {
      position:absolute; bottom:38px; left:50%; transform:translateX(-50%);
      width:180px; height:1px;
      background:rgba(255,255,255,0.07); border-radius:2px; overflow:hidden; z-index:10;
    }
    #sp-prog {
      height:100%; width:0%;
      background:linear-gradient(90deg,#1a7eff,#60d8ff);
      box-shadow:0 0 8px rgba(100,210,255,0.8); border-radius:2px;
    }
    #sp-pct {
      position:absolute; bottom:50px; right:38px;
      font-size:10px; letter-spacing:2px;
      color:rgba(100,185,255,0.38); z-index:10;
      font-variant-numeric:tabular-nums;
    }
  </style>

  <link rel="stylesheet" href="css/main.css" />
</head>
<body>

  <!-- SPLASH -->
  <div id="splash" role="presentation" aria-hidden="true">
    <canvas id="sp-canvas"></canvas>

    <div class="sp-ring sp-ring-1"></div>
    <div class="sp-ring sp-ring-2"></div>
    <div class="sp-ring sp-ring-3"></div>
    <div class="sp-ring sp-ring-4"></div>

    <div id="sp-scan"></div>

    <div id="sp-center">
      <div id="sp-tag">by E-Vision</div>
      <div id="sp-row">

        <!-- Ícone de círculos -->
        <svg id="sp-icon" viewBox="0 0 80 96" fill="none" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <radialGradient id="icg" cx="50%" cy="50%" r="50%">
              <stop offset="0%" stop-color="#60c0ff"/>
              <stop offset="100%" stop-color="#1060cc"/>
            </radialGradient>
            <filter id="iglow" x="-40%" y="-40%" width="180%" height="180%">
              <feGaussianBlur stdDeviation="2.2" result="b"/>
              <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
            </filter>
          </defs>
          <g filter="url(#iglow)">
            <circle cx="38" cy="48" r="6"   fill="#90e0ff" opacity="0.95"/>
            <circle cx="38" cy="30" r="4.5" fill="url(#icg)" opacity="0.9"/>
            <circle cx="52" cy="38" r="4.5" fill="url(#icg)" opacity="0.9"/>
            <circle cx="52" cy="58" r="4.5" fill="url(#icg)" opacity="0.9"/>
            <circle cx="38" cy="66" r="4.5" fill="url(#icg)" opacity="0.9"/>
            <circle cx="24" cy="58" r="4.5" fill="url(#icg)" opacity="0.9"/>
            <circle cx="24" cy="38" r="4.5" fill="url(#icg)" opacity="0.9"/>
            <circle cx="38" cy="16" r="3"   fill="#4aafff" opacity="0.75"/>
            <circle cx="57" cy="22" r="3"   fill="#4aafff" opacity="0.75"/>
            <circle cx="65" cy="40" r="3"   fill="#4aafff" opacity="0.75"/>
            <circle cx="62" cy="62" r="2.5" fill="#4aafff" opacity="0.65"/>
            <circle cx="47" cy="76" r="2.5" fill="#4aafff" opacity="0.65"/>
            <circle cx="28" cy="78" r="2.5" fill="#4aafff" opacity="0.6"/>
            <circle cx="14" cy="65" r="2.5" fill="#4aafff" opacity="0.6"/>
            <circle cx="11" cy="45" r="2.5" fill="#4aafff" opacity="0.65"/>
            <circle cx="18" cy="25" r="3"   fill="#4aafff" opacity="0.75"/>
          </g>
          <circle cx="38" cy="48" r="3.5" fill="white" opacity="0.95"/>
          <circle cx="38" cy="48" r="10"  fill="#60b0ff" opacity="0.18"/>
        </svg>

        <!-- +244 -->
        <div id="sp-num-wrap">
          <div id="sp-ghost">+244</div>
          <div id="sp-number">
            +244
            <div id="sp-flare"></div>
          </div>
        </div>
      </div>

      <div id="sp-sub">CONSULTORIA &nbsp;|&nbsp; MARKETING &nbsp;|&nbsp; EVENTOS</div>
    </div>

    <div id="sp-prog-wrap"><div id="sp-prog"></div></div>
    <div id="sp-pct">000%</div>
  </div>


  <!-- SITE PRINCIPAL -->
  <div id="site-wrapper">
    <div id="site-header"></div>
    <main id="site-main"></main>
    <div id="site-footer"></div>
    <button class="back-top" id="backTop" aria-label="Voltar ao topo">
      <span class="arrow-up" aria-hidden="true"></span>
    </button>
  </div>


  <script>
    'use strict';

    /* ══════════════════════════════════════════════
       SPLASH — animação melhorada
    ══════════════════════════════════════════════ */
    (function () {
      document.body.classList.add('splash-active');

      var canvas = document.getElementById('sp-canvas');
      var ctx    = canvas.getContext('2d');
      var W, H, raf, tick = 0;

      /* Partículas flotantes */
      var pts = [];
      function buildPts() {
        pts = [];
        var n = Math.min(140, Math.floor(W * H / 7000));
        for (var i = 0; i < n; i++) {
          pts.push({
            x: Math.random() * W, y: Math.random() * H,
            r: Math.random() * 1.4 + 0.3,
            vx:(Math.random()-.5)*.22, vy:(Math.random()-.5)*.22,
            phase: Math.random()*Math.PI*2,
            spd:   .007+Math.random()*.015
          });
        }
      }

      /* Grupos de linhas rotativas */
      var lgs = [
        {cx:0,cy:0,a:0,            da: .003, col:'rgba(55,130,255,', n:20, sp:2.1},
        {cx:0,cy:0,a:Math.PI*.38,  da:-.002, col:'rgba(35,95,210,',  n:15, sp:1.8},
        {cx:0,cy:0,a:Math.PI*.75,  da: .0017,col:'rgba(75,175,255,', n:11, sp:1.5}
      ];
      var lAlpha = 0;

      function resize() {
        W = canvas.width  = window.innerWidth;
        H = canvas.height = window.innerHeight;
        lgs[0].cx=W*.76; lgs[0].cy=-H*.08;
        lgs[1].cx=W*.10; lgs[1].cy= H*.58;
        lgs[2].cx=W*.89; lgs[2].cy= H*.88;
        buildPts();
      }
      resize();
      window.addEventListener('resize', resize);

      function frame() {
        tick++;
        ctx.clearRect(0,0,W,H);

        /* Pontos de grid */
        if (lAlpha > .08) {
          var ga = lAlpha * .028;
          ctx.fillStyle = 'rgba(80,170,255,'+ga+')';
          for (var gx=44; gx<W; gx+=44)
            for (var gy=44; gy<H; gy+=44) {
              ctx.beginPath(); ctx.arc(gx,gy,.75,0,6.28); ctx.fill();
            }
        }

        /* Linhas */
        lgs.forEach(function(g) {
          g.a += g.da;
          for (var i=0; i<g.n; i++) {
            var ang = g.a + (i/g.n)*Math.PI*g.sp;
            var len = Math.max(W,H)*1.85;
            var al  = lAlpha*(.055 + .03*Math.sin(tick*.0008+i*.6));
            ctx.beginPath();
            ctx.moveTo(g.cx,g.cy);
            ctx.lineTo(g.cx+Math.cos(ang)*len, g.cy+Math.sin(ang)*len);
            ctx.strokeStyle = g.col+al+')';
            ctx.lineWidth   = .5;
            ctx.stroke();
          }
        });

        /* Partículas */
        pts.forEach(function(p) {
          p.x+=p.vx; p.y+=p.vy;
          if(p.x<0)p.x=W; if(p.x>W)p.x=0;
          if(p.y<0)p.y=H; if(p.y>H)p.y=0;
          p.phase+=p.spd;
          var al = lAlpha*(.55+.35*Math.sin(p.phase))*.75;
          ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,6.28);
          ctx.fillStyle='rgba(120,205,255,'+al+')';
          ctx.fill();
        });

        raf = requestAnimationFrame(frame);
      }
      frame();

      /* Progresso */
      var prog   = document.getElementById('sp-prog');
      var pctEl  = document.getElementById('sp-pct');
      function setP(v) {
        prog.style.width = v+'%';
        pctEl.textContent = String(Math.round(v)).padStart(3,'0')+'%';
      }

      /* ── GSAP timeline ── */
      gsap.set(['#sp-tag','#sp-icon','#sp-number','#sp-sub'], {opacity:0});
      gsap.set('#sp-icon',   {x:-28, scale:.82});
      gsap.set('#sp-number', {y:22,  scale:.9});
      gsap.set('#sp-sub',    {y:14,  letterSpacing:'9px'});
      gsap.set('.sp-ring',   {scale:0, opacity:0});
      gsap.set('#sp-ghost',  {opacity:0});

      var tl = gsap.timeline({delay:.05});

      /* Linhas sobem */
      tl.to({},{duration:.85, onUpdate:function(){lAlpha=this.progress()*.88;}});

      /* Scanline */
      tl.fromTo('#sp-scan',{width:'0%',opacity:1},{width:'100%',duration:.5,ease:'power3.in'},'-=.3');
      tl.to('#sp-scan',{opacity:0,duration:.12});

      /* Anéis em cascata */
      tl.to('.sp-ring-1',{scale:1,opacity:.8,duration:.38,ease:'power2.out'},'-=.05');
      tl.to('.sp-ring-2',{scale:1,opacity:.5,duration:.48,ease:'power2.out'},'-=.3');
      tl.to('.sp-ring-3',{scale:1,opacity:.3,duration:.58,ease:'power2.out'},'-=.38');
      tl.to('.sp-ring-4',{scale:1,opacity:.14,duration:.65,ease:'power2.out'},'-=.45');

      /* Pulso infinito nos anéis */
      tl.to('.sp-ring',{
        opacity:function(i){return [.15,.1,.06,.03][i]||.03;},
        scale:1.06, duration:1.4, ease:'sine.inOut',
        stagger:.1, repeat:-1, yoyo:true
      },'-=.6');

      /* Ícone */
      tl.to('#sp-icon',{opacity:1,x:0,scale:1,duration:.52,ease:'back.out(1.7)'},'-=1.2');

      /* Tag */
      tl.to('#sp-tag',{opacity:1,duration:.28,ease:'power2.out'},'-=.28');

      /* +244 */
      tl.to('#sp-number',{opacity:1,y:0,scale:1,duration:.58,ease:'back.out(1.45)'},'-=.18');

      /* Flare sweep */
      tl.fromTo('#sp-flare',{x:'-115%'},{x:'130%',duration:.68,ease:'power2.inOut'},'-=.08');

      /* Glitch duplo */
      tl.fromTo('#sp-ghost',{opacity:.45,x:-4,y:2},{opacity:0,x:4,y:0,duration:.1,ease:'none'},'-=.5');
      tl.fromTo('#sp-ghost',{opacity:.28,x:3,y:-1},{opacity:0,x:0,y:0,duration:.08,ease:'none'});
      tl.fromTo('#sp-ghost',{opacity:.18,x:-2},{opacity:0,x:0,duration:.06,ease:'none'},'.08');

      /* Subtítulo */
      tl.to('#sp-sub',{opacity:1,y:0,letterSpacing:'5px',duration:.55,ease:'power3.out'},'-=.4');

      /* Barra de progresso */
      tl.to({v:0},{v:100,duration:1.9,ease:'power1.inOut',
        onUpdate:function(){setP(this.targets()[0].v);}
      },'-=.55');

      /* Pausa */
      tl.to({},{duration:.35});

      /* Fade out */
      tl.to('#splash',{opacity:0,duration:.62,ease:'power2.inOut',
        onComplete:function(){
          document.getElementById('splash').style.display='none';
          document.body.classList.remove('splash-active');
          cancelAnimationFrame(raf);
          document.getElementById('site-wrapper').classList.add('ready');
        }
      });

      window._splashTL = tl;
    })();


    /* ══════════════════════════════════════════════
       LOADER DE SECÇÕES
    ══════════════════════════════════════════════ */
    var headerSections = ['header'];
    var mainSections   = [
      'hero','sobre','servicos','angola','parceiros',
      'eventos','portfolio','testemunhos','agendamento','contactos'
    ];
    var footerSections = ['footer'];

    function loadSection(n) {
      return fetch('sections/'+n+'.html').then(function(r){
        if(!r.ok) throw new Error('Erro: '+n);
        return r.text();
      });
    }
    function loadAll() {
      return Promise.all([
        Promise.all(headerSections.map(loadSection)).then(function(p){document.getElementById('site-header').innerHTML=p.join('');}),
        Promise.all(mainSections.map(loadSection)).then(function(p){document.getElementById('site-main').innerHTML=p.join('');}),
        Promise.all(footerSections.map(loadSection)).then(function(p){document.getElementById('site-footer').innerHTML=p.join('');})
      ]);
    }
    function initScripts(){
      var s=document.createElement('script');
      s.src='js/main.js';
      document.body.appendChild(s);
    }
    loadAll().then(initScripts).catch(function(e){
      console.error('Erro ao carregar o site:',e);
      if(window._splashTL) window._splashTL.progress(1);
    });
  </script>

</body>
</html>
